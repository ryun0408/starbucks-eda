    <style>
        :root {
            --starbucks-green: #00704A;
            --starbucks-dark: #1E3932;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--text-color);
        }
        
        .sidebar {
            width: 260px;
            height: 100vh;
            background-color: var(--starbucks-dark);
            position: fixed;
            color: white;
            padding: 20px;
        }
        
        .main-content {
            margin-left: 280px;
            padding: 30px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--starbucks-green);
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .card-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--starbucks-green);
        }
        
        /* Layout Grid */
        .layout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .map-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            height: 600px;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }
        
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        /* Table */
        .table-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        table.dataTable thead th {
            background-color: var(--starbucks-green);
            color: white;
        }
    </style>
</head>
